name: Deploy Firebase Database Rules

on:
  push:
    branches:
      - main
    paths:
      - 'database.rules.json'
      - 'firebase.json'

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Write the service account key JSON to a temporary file.
      # Required GitHub secret: FIREBASE_SERVICE_ACCOUNT_JSON
      #   - Contents of a Google Cloud service account key JSON file with
      #     Firebase Admin / RTDB deploy permissions.
      - name: Write service account credentials
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > "${{ runner.temp }}/gcp-key.json"
        shell: bash

      - name: Deploy Firebase Database Rules
        # Project is read automatically from .firebaserc (default: "neon-slip").
        # No FIREBASE_PROJECT_ID variable needed.
        run: npx firebase-tools@latest deploy --only database --non-interactive
        env:
          # Authenticates the Firebase CLI via the service account key.
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-key.json

      - name: Remove service account credentials
        if: always()
        run: rm -f "${{ runner.temp }}/gcp-key.json"
        shell: bash
